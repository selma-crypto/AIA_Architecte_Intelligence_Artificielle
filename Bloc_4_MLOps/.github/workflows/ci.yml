name: CI — Tests & Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  MODEL_PATH: "fraud_xgb_model.pkl"

jobs:
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install lint tools
        run: pip install ruff black
      - name: Ruff check
        run: ruff check api/ monitoring/ pipeline/ tests/
      - name: Black format check
        run: black --check api/ monitoring/ pipeline/ tests/

  # ─────────────────────────────────────────────
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Télécharger artefact modèle (cache S3)
        env:
          BUCKET_URL: ${{ secrets.MODEL_BUCKET_URL }}
        run: |
          if [ -n "$BUCKET_URL" ]; then
            curl -f "$BUCKET_URL/fraud_xgb_model.pkl" -o fraud_xgb_model.pkl \
              || echo "Modèle absent — tests sans modèle réel"
          fi

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────────
  validate-model:
    name: Validation seuils modèle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate model performance thresholds
        env:
          MIN_RECALL: "0.80"
          MIN_PRECISION: "0.55"
          MIN_F1: "0.65"
        run: python pipeline/validate_model.py

  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker (dry run)
    runs-on: ubuntu-latest
    needs: validate-model
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile.api
          push: false
          tags: fraud-detection-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
