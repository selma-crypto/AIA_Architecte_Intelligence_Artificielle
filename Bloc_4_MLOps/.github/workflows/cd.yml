name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'monitoring/**'
      - 'pipeline/**'
      - 'requirements.txt'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fraud-detection-api

jobs:
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/fraud-detection
            docker pull ${{ needs.build-and-push.outputs.image-tag }}
            docker compose pull api
            docker compose up -d api
            sleep 10
            # Health check
            curl -f http://localhost:8000/health || exit 1
            echo "Staging deployment successful"

      - name: Run smoke tests on staging
        run: |
          pip install httpx
          python tests/smoke_test.py --base-url ${{ vars.STAGING_URL }}

  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/fraud-detection
            # Backup current model version
            docker compose exec api python -c "
            import pickle, shutil, time
            shutil.copy('fraud_xgb_model.pkl', f'fraud_xgb_model.bak.{int(time.time())}.pkl')
            print('Backup créé')
            " || true
            # Rolling update
            docker pull ${{ needs.build-and-push.outputs.image-tag }}
            docker compose up -d --no-deps api
            sleep 15
            curl -f http://localhost:8000/health || (docker compose rollback api && exit 1)
            echo "Production deployment successful"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Déploiement production: *${{ job.status }}*\nCommit: ${{ github.sha }}\nAuteur: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────
  retrain-trigger:
    name: Déclencher réentraînement si nouvelles données
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[retrain]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline deps
        run: pip install -r requirements.txt
      - name: Trigger retraining pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python pipeline/retrain.py --trigger=ci_cd --auto-deploy
