# Paramètres versionnés avec DVC
# Modifier ce fichier + lancer `dvc repro` pour reproduire le pipeline complet

prepare:
  test_size: 0.20
  val_size: 0.10
  random_state: 42
  target_col: is_fraud

train:
  n_estimators: 360
  max_depth: 3
  learning_rate: 0.08989
  gamma: 6.832
  min_child_weight: 16
  subsample: 0.999
  colsample_bytree: 0.542
  scale_pos_weight: 5.004
  decision_threshold: 0.30
  # Optuna HPO
  optimize: false
  n_trials: 30

evaluate:
  min_recall: 0.80
  min_precision: 0.55
  min_f1: 0.65

monitoring:
  drift_threshold_warn: 0.10
  drift_threshold_critical: 0.25
  psi_buckets: 10
  schedule_hours: 6
